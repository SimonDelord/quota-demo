# Step 2 — namespace-level budget (aggregate limits for quota-demo).
# Intentionally tight so scaling the demo Deployment fails quickly (step 3).
apiVersion: v1
kind: ResourceQuota
metadata:
  name: demo-quota
  namespace: quota-demo
spec:
  hard:
    requests.cpu: "250m"
    requests.memory: 512Mi
    limits.cpu: "500m"
    limits.memory: 1Gi
    pods: "10"
    count/deployments.apps: "5"
